name: Mirror GitHub to CNB

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mirror-cnb-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror-branch:
    if: >-
      startsWith(github.ref, 'refs/heads/') &&
      github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Mirror branch to CNB
        uses: docker://tencentcom/git-sync
        env:
          PLUGIN_TARGET_URL: ${{ secrets.CNB_REPO_URL }}
          PLUGIN_AUTH_TYPE: https
          PLUGIN_USERNAME: ${{ secrets.CNB_GIT_USERNAME }}
          PLUGIN_PASSWORD: ${{ secrets.CNB_GIT_TOKEN }}
          PLUGIN_BRANCH: ${{ github.ref_name }}
          PLUGIN_FORCE: "false"
          PLUGIN_PUSH_TAGS: "false"

  mirror-tag:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror tag to CNB
        env:
          CNB_REPO_URL: ${{ secrets.CNB_REPO_URL }}
          CNB_GIT_USERNAME: ${{ secrets.CNB_GIT_USERNAME }}
          CNB_GIT_TOKEN: ${{ secrets.CNB_GIT_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          git remote add cnb "$CNB_REPO_URL"
          auth_header="$(printf '%s:%s' "$CNB_GIT_USERNAME" "$CNB_GIT_TOKEN" | base64 | tr -d '\n')"
          git -c "http.extraHeader=Authorization: Basic ${auth_header}" \
            push cnb "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
