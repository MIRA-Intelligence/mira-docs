name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 站点实际对外仓库是 MIRA-Intelligence/mira-intelligence.github.io。
# 这里我们构建 Docusaurus，然后用 peaceiris/actions-gh-pages 以 SSH deploy key
# 的身份把 build/ 强推到那个仓库的 main 分支，由 GitHub Pages 托管根域名。
concurrency:
  group: deploy-pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
      TENCENT_USER: ${{ secrets.TENCENT_USER }}
      TENCENT_PORT: ${{ secrets.TENCENT_PORT }}
      TENCENT_DEPLOY_PATH: ${{ secrets.TENCENT_DEPLOY_PATH }}
      TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (all locales)
        run: npm run build

      - name: Publish to mira-intelligence.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: MIRA-Intelligence/mira-intelligence.github.io
          publish_branch: main
          publish_dir: ./build
          # 保留 .git 但每次强推，不累计历史垃圾
          force_orphan: true
          user_name: "mira-docs-bot"
          user_email: "mira-docs-bot@users.noreply.github.com"
          commit_message: "Deploy mira-docs @ ${{ github.sha }}"

      - name: Publish to Tencent Cloud
        if: ${{ env.TENCENT_HOST != '' && env.TENCENT_SSH_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail

          : "${TENCENT_USER:=ubuntu}"
          : "${TENCENT_PORT:=22}"
          : "${TENCENT_DEPLOY_PATH:=/opt/mira-docs/site}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$TENCENT_SSH_KEY" > ~/.ssh/tencent_mira_docs
          chmod 600 ~/.ssh/tencent_mira_docs

          ssh-keyscan -p "$TENCENT_PORT" -H "$TENCENT_HOST" >> ~/.ssh/known_hosts

          rsync -az --delete \
            -e "ssh -i ~/.ssh/tencent_mira_docs -p $TENCENT_PORT" \
            build/ "$TENCENT_USER@$TENCENT_HOST:$TENCENT_DEPLOY_PATH/"

          ssh -i ~/.ssh/tencent_mira_docs -p "$TENCENT_PORT" "$TENCENT_USER@$TENCENT_HOST" \
            'if command -v docker >/dev/null 2>&1 && docker ps --format "{{.Names}}" | grep -qx mira-docs; then docker exec mira-docs nginx -s reload >/dev/null 2>&1 || true; fi'
