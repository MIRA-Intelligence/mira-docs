name: Open GitHub PR for CNB Branch

on:
  push:
    branches:
      - "cnb/**"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: cnb-inbound-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  open-pr:
    if: github.event.deleted != true
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_SYNC_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const base = 'main';

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              base,
              per_page: 10,
            });

            if (existing.data.length > 0) {
              core.notice(`PR already exists: ${existing.data[0].html_url}`);
              return;
            }

            const shortName = branch.replace(/^cnb\//, '').replace(/\//g, ': ');
            const body = [
              `Imported from CNB branch \`${branch}\`.`,
              '',
              'GitHub remains the merge authority for this repository.',
              'Review, CI, and merge should happen on this GitHub PR.',
            ].join('\n');

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title: `[CNB] ${shortName}`,
              head: branch,
              base,
              body,
              maintainer_can_modify: true,
            });

            core.notice(`Created PR: ${created.data.html_url}`);
